{% extends "base.html" %}
{% block title %}Vivekananda Sangathan | Utsav{% endblock %}
{% block content %}

<section class="page-header"{% if section.image or section.image_url %} style="background-image: linear-gradient(135deg, rgba(19, 78, 74, 0.88), rgba(23, 37, 84, 0.86)), url('{{ asset_url(section.image, section.image_url) }}');"{% endif %}>
    <div class="container">
        <span class="eyebrow">{{ section.subtitle }}</span>
        <h1>{{ section.title }}</h1>
        <p>{{ section.body }}</p>
    </div>
</section>

<section class="container section-space timeline">
    {% for event in events %}
        <article>
            <span>{{ loop.index }}</span>
            <h2>{{ event }}</h2>
        </article>
    {% endfor %}
</section>

{% endblock %}
