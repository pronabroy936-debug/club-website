{% extends "base.html" %}
{% block title %}Club | Admin Login{% endblock %}
{% block content %}

<section class="page-header">
    <div class="container">
        <span class="eyebrow">Private access</span>
        <h1>Admin Login</h1>
        <p>Only club administrators can upload media and manage website content.</p>
    </div>
</section>

<section class="container section-space narrow-layout">
    <form method="post" class="form-panel">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" class="form-control" autocomplete="username" required>

        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>

        <button class="btn btn-dark">Login</button>
    </form>
</section>

{% endblock %}
